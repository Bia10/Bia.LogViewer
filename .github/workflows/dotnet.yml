name: .NET

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore Bia.LogViewer.slnx

      - name: Build
        run: dotnet build Bia.LogViewer.slnx -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test --solution Bia.LogViewer.slnx -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: TestResults
          fail_ci_if_error: false

      - name: Format check (CSharpier)
        run: dotnet csharpier check .

      - name: Format check (style)
        run: dotnet format style Bia.LogViewer.slnx --verify-no-changes --no-restore

      - name: Format check (analyzers)
        run: dotnet format analyzers Bia.LogViewer.slnx --verify-no-changes --no-restore
